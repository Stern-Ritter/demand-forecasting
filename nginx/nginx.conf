events {
    worker_connections 100;
}

http {
    include /etc/nginx/mime.types;
    resolver 127.0.0.11 ipv6=off;

    # Allow large CSV uploads (up to 110 MB)
    client_max_body_size 110m;

    server {
        listen 80;

        root /usr/share/nginx/html;

        location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }

        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Long timeout for ML training jobs
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 110m;
        }

        location /docs {
            proxy_pass http://app:8000/docs;
        }

        location /redoc {
            proxy_pass http://app:8000/redoc;
        }

        location /openapi.json {
            proxy_pass http://app:8000/openapi.json;
        }

        location /health {
            proxy_pass http://app:8000/health;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
